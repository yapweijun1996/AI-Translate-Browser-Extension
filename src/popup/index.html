<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        min-width: 260px;
        margin: 0;
        padding: 16px;
        font-family: system-ui, sans-serif;
      }
      h1 {
        font-size: 15px;
        margin: 0 0 8px;
      }
      p {

  </body>
</html>
