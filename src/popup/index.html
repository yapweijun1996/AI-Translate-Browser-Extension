<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        width: 260px;
        margin: 0;
        padding: 14px 16px;
        font-family: system-ui, sans-serif;
        color: #1a1a1a;
      }
      h1 {
        font-size: 15px;
        margin: 0 0 10px;
      }
      .toggle-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding-bottom: 10px;
        margin-bottom: 10px;
        border-bottom: 1px solid #e6e6e8;
      }
      .toggle-label {
        font-size: 13px;
        font-weight: 500;
      }
      .toggle-switch {
        position: relative;
        display: inline-block;
        width: 36px;
        height: 20px;
        flex-shrink: 0;
      }
      .toggle-switch input {
        position: absolute;
        width: 100%;
        height: 100%;
        margin: 0;
        opacity: 0;
        cursor: pointer;
      }
      .toggle-track {
        position: absolute;
        inset: 0;
        background: #d0d0d5;
        border-radius: 999px;
        transition: background-color 0.15s ease;
      }
      .toggle-track::before {
        content: '';
        position: absolute;
        top: 2px;
        left: 2px;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: #fff;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.25);
        transition: transform 0.15s ease;
      }
      .toggle-switch input:checked + .toggle-track {
        background: #2563eb;
      }
      .toggle-switch input:checked + .toggle-track::before {
        transform: translateX(16px);
      }
      .toggle-switch input:focus-visible + .toggle-track {
        outline: 2px solid #2563eb;
        outline-offset: 2px;
      }
      .status-row {
        display: flex;
        align-items: baseline;
        gap: 6px;
        font-size: 13px;
        margin-bottom: 4px;
      }
      .status-label {
        color: #666;
      }
      .status-value {
        font-weight: 500;
      }
      .no-engine {
        font-size: 13px;
        color: #a02525;
        margin: 0 0 10px;
      }
      .hint {
        font-size: 12px;
        color: #777;
        line-height: 1.4;
        margin: 10px 0 14px;
      }
      body.is-disabled .status-row,
      body.is-disabled .no-engine,
      body.is-disabled #usageHint {
        display: none;
      }
      button {
        width: 100%;
        padding: 8px;
        font-size: 13px;
        cursor: pointer;
        border: 1px solid #d0d0d0;
        border-radius: 6px;
        background: #f7f7f8;
        color: #1a1a1a;
      }
      button:hover {
        background: #efeff1;
      }
    </style>
  </head>
  <body>
    <h1 data-i18n="ext_name"></h1>

    <div class="toggle-row">
      <span class="toggle-label" data-i18n="popup_enabled_label"></span>
      <label class="toggle-switch">
        <input type="checkbox" id="enabledToggle" />
        <span class="toggle-track" aria-hidden="true"></span>
      </label>
    </div>

    <p class="hint" id="disabledHint" hidden data-i18n="popup_disabled_hint"></p>

    <div id="engineStatus">
      <div class="status-row" id="engineStatusRow" hidden>
        <span class="status-label" data-i18n="popup_current_engine_label"></span>
        <span class="status-value" id="engineStatusValue"></span>
      </div>
      <p class="no-engine" id="noEngineNote" hidden data-i18n="popup_no_engine"></p>
    </div>

    <p class="hint" id="usageHint" data-i18n="popup_usage_hint"></p>

    <button type="button" id="openSettingsBtn" data-i18n="popup_settings_button"></button>

    <script type="module" src="./popup.js"></script>
  </body>
</html>
