<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        width: 260px;
        margin: 0;
        padding: 14px 16px;
        font-family: system-ui, sans-serif;
        color: #1a1a1a;
      }
      h1 {
        font-size: 15px;
        margin: 0 0 10px;
      }
      .status-row {
        display: flex;
        align-items: baseline;
        gap: 6px;
        font-size: 13px;
        margin-bottom: 4px;
      }
      .status-label {
        color: #666;
      }
      .status-value {
        font-weight: 500;
      }
      .no-engine {
        font-size: 13px;
        color: #a02525;
        margin: 0 0 10px;
      }
      .hint {
        font-size: 12px;
        color: #777;
        line-height: 1.4;
        margin: 10px 0 14px;
      }
      button {
        width: 100%;
        padding: 8px;
        font-size: 13px;
        cursor: pointer;
        border: 1px solid #d0d0d0;
        border-radius: 6px;
        background: #f7f7f8;
        color: #1a1a1a;
      }
      button:hover {
        background: #efeff1;
      }
    </style>
  </head>
  <body>
    <h1 data-i18n="ext_name"></h1>

    <div id="engineStatus">
      <div class="status-row" id="engineStatusRow" hidden>
        <span class="status-label" data-i18n="popup_current_engine_label"></span>
        <span class="status-value" id="engineStatusValue"></span>
      </div>
      <p class="no-engine" id="noEngineNote" hidden data-i18n="popup_no_engine"></p>
    </div>

    <p class="hint" data-i18n="popup_usage_hint"></p>

    <button type="button" id="openSettingsBtn" data-i18n="popup_settings_button"></button>

    <script type="module" src="./popup.js"></script>
  </body>
</html>
